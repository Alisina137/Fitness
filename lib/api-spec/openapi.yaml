openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: FitCore AI Fitness App API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: users
    description: User profile operations
  - name: workouts
    description: Workout plan operations
  - name: exercises
    description: Exercise library operations
  - name: nutrition
    description: Nutrition tracking operations
  - name: progress
    description: Progress tracking operations
  - name: dashboard
    description: Dashboard summary operations
  - name: ai
    description: AI coach operations
  - name: subscriptions
    description: Subscription operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ─── Auth ───────────────────────────────────────────────────────────────────
  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterInput"
      responses:
        "201":
          description: Registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Validation error

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized

  # ─── Users ──────────────────────────────────────────────────────────────────
  /users/profile:
    get:
      operationId: getUserProfile
      tags: [users]
      summary: Get user profile
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
    patch:
      operationId: updateUserProfile
      tags: [users]
      summary: Update user profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserProfileUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"

  # ─── Dashboard ───────────────────────────────────────────────────────────────
  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get dashboard summary stats
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/activity:
    get:
      operationId: getRecentActivity
      tags: [dashboard]
      summary: Get recent activity feed
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityItem"

  # ─── Workouts ────────────────────────────────────────────────────────────────
  /workouts:
    get:
      operationId: listWorkouts
      tags: [workouts]
      summary: List workout plans
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [active, completed, all]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WorkoutPlan"
    post:
      operationId: createWorkout
      tags: [workouts]
      summary: Create workout plan
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkoutPlanInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkoutPlan"

  /workouts/today:
    get:
      operationId: getTodayWorkout
      tags: [workouts]
      summary: Get today's scheduled workout
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TodayWorkout"

  /workouts/{id}:
    get:
      operationId: getWorkout
      tags: [workouts]
      summary: Get a workout plan
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkoutPlan"
        "404":
          description: Not found
    patch:
      operationId: updateWorkout
      tags: [workouts]
      summary: Update a workout plan
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkoutPlanUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkoutPlan"
    delete:
      operationId: deleteWorkout
      tags: [workouts]
      summary: Delete a workout plan
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /workouts/{id}/complete:
    post:
      operationId: completeWorkout
      tags: [workouts]
      summary: Mark a workout as completed
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkoutCompletionInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkoutCompletion"

  /workouts/history:
    get:
      operationId: getWorkoutHistory
      tags: [workouts]
      summary: Get workout completion history
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 10
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WorkoutCompletion"

  # ─── Exercises ───────────────────────────────────────────────────────────────
  /exercises:
    get:
      operationId: listExercises
      tags: [exercises]
      summary: List exercises
      parameters:
        - name: category
          in: query
          required: false
          schema:
            type: string
        - name: muscleGroup
          in: query
          required: false
          schema:
            type: string
        - name: difficulty
          in: query
          required: false
          schema:
            type: string
            enum: [beginner, intermediate, advanced]
        - name: search
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Exercise"

  /exercises/{id}:
    get:
      operationId: getExercise
      tags: [exercises]
      summary: Get an exercise
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Exercise"
        "404":
          description: Not found

  # ─── Nutrition ───────────────────────────────────────────────────────────────
  /nutrition:
    get:
      operationId: listNutritionEntries
      tags: [nutrition]
      summary: List nutrition entries
      parameters:
        - name: date
          in: query
          required: false
          schema:
            type: string
            format: date
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/NutritionEntry"
    post:
      operationId: createNutritionEntry
      tags: [nutrition]
      summary: Log a meal or food item
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NutritionEntryInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NutritionEntry"

  /nutrition/{id}:
    delete:
      operationId: deleteNutritionEntry
      tags: [nutrition]
      summary: Delete a nutrition entry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /nutrition/summary:
    get:
      operationId: getNutritionSummary
      tags: [nutrition]
      summary: Get daily nutrition summary
      parameters:
        - name: date
          in: query
          required: false
          schema:
            type: string
            format: date
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NutritionSummary"

  # ─── Progress ────────────────────────────────────────────────────────────────
  /progress:
    get:
      operationId: listProgressEntries
      tags: [progress]
      summary: List progress entries
      parameters:
        - name: type
          in: query
          required: false
          schema:
            type: string
            enum: [weight, measurement, achievement]
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 30
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProgressEntry"
    post:
      operationId: createProgressEntry
      tags: [progress]
      summary: Log a progress entry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProgressEntryInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProgressEntry"

  /progress/achievements:
    get:
      operationId: getAchievements
      tags: [progress]
      summary: Get user achievements
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Achievement"

  /progress/stats:
    get:
      operationId: getProgressStats
      tags: [progress]
      summary: Get progress statistics
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProgressStats"

  # ─── AI Coach ────────────────────────────────────────────────────────────────
  /ai/conversations:
    get:
      operationId: listConversations
      tags: [ai]
      summary: List AI coach conversations
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Conversation"
    post:
      operationId: createConversation
      tags: [ai]
      summary: Start a new conversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConversationInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Conversation"

  /ai/conversations/{id}/messages:
    get:
      operationId: getConversationMessages
      tags: [ai]
      summary: Get messages in a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Message"
    post:
      operationId: sendMessage
      tags: [ai]
      summary: Send a message to the AI coach
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MessageInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"

  # ─── Subscriptions ───────────────────────────────────────────────────────────
  /subscriptions/current:
    get:
      operationId: getCurrentSubscription
      tags: [subscriptions]
      summary: Get current subscription
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Subscription"

  /subscriptions/plans:
    get:
      operationId: listSubscriptionPlans
      tags: [subscriptions]
      summary: List available subscription plans
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SubscriptionPlan"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    MessageResponse:
      type: object
      properties:
        message:
          type: string
      required:
        - message

    # ─── Auth ──────────────────────────────────────────────────────────────────
    RegisterInput:
      type: object
      required: [email, password, name]
      properties:
        email:
          type: string
        password:
          type: string
          minLength: 8
        name:
          type: string

    LoginInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
        password:
          type: string

    AuthResponse:
      type: object
      required: [user, token]
      properties:
        user:
          $ref: "#/components/schemas/User"
        token:
          type: string

    User:
      type: object
      required: [id, email, name, createdAt]
      properties:
        id:
          type: integer
        email:
          type: string
        name:
          type: string
        avatarUrl:
          type: ["string", "null"]
        subscriptionStatus:
          type: string
          enum: [free, premium, elite]
        onboardingCompleted:
          type: boolean
        createdAt:
          type: string
          format: date-time

    # ─── User Profile ──────────────────────────────────────────────────────────
    UserProfile:
      type: object
      required: [id, userId, fitnessLevel, goals]
      properties:
        id:
          type: integer
        userId:
          type: integer
        age:
          type: ["integer", "null"]
        gender:
          type: ["string", "null"]
          enum: [male, female, non_binary, prefer_not_to_say, null]
        heightCm:
          type: ["number", "null"]
        weightKg:
          type: ["number", "null"]
        fitnessLevel:
          type: string
          enum: [beginner, intermediate, advanced]
        goals:
          type: array
          items:
            type: string
        preferences:
          type: object
          additionalProperties: true
        equipmentAvailable:
          type: array
          items:
            type: string
        injuries:
          type: array
          items:
            type: string
        weeklyWorkoutTarget:
          type: ["integer", "null"]

    UserProfileUpdate:
      type: object
      properties:
        age:
          type: integer
        gender:
          type: string
        heightCm:
          type: number
        weightKg:
          type: number
        fitnessLevel:
          type: string
          enum: [beginner, intermediate, advanced]
        goals:
          type: array
          items:
            type: string
        equipmentAvailable:
          type: array
          items:
            type: string
        injuries:
          type: array
          items:
            type: string
        weeklyWorkoutTarget:
          type: integer

    # ─── Dashboard ─────────────────────────────────────────────────────────────
    DashboardSummary:
      type: object
      required: [workoutsThisWeek, weeklyTarget, totalMinutes, caloriesBurned, currentStreak, nutritionToday]
      properties:
        workoutsThisWeek:
          type: integer
        weeklyTarget:
          type: integer
        totalMinutes:
          type: integer
        caloriesBurned:
          type: integer
        currentStreak:
          type: integer
        nutritionToday:
          $ref: "#/components/schemas/NutritionSummary"
        nextWorkout:
          $ref: "#/components/schemas/TodayWorkout"

    ActivityItem:
      type: object
      required: [id, type, title, description, occurredAt]
      properties:
        id:
          type: integer
        type:
          type: string
          enum: [workout_completed, nutrition_logged, progress_logged, achievement_earned]
        title:
          type: string
        description:
          type: string
        occurredAt:
          type: string
          format: date-time

    # ─── Workouts ──────────────────────────────────────────────────────────────
    WorkoutPlan:
      type: object
      required: [id, userId, name, exercises, createdAt]
      properties:
        id:
          type: integer
        userId:
          type: integer
        name:
          type: string
        description:
          type: ["string", "null"]
        durationMinutes:
          type: ["integer", "null"]
        difficulty:
          type: string
          enum: [beginner, intermediate, advanced]
        category:
          type: ["string", "null"]
        exercises:
          type: array
          items:
            $ref: "#/components/schemas/WorkoutExercise"
        isActive:
          type: boolean
        completionCount:
          type: integer
        createdAt:
          type: string
          format: date-time

    WorkoutExercise:
      type: object
      required: [exerciseId, name, sets, reps]
      properties:
        exerciseId:
          type: integer
        name:
          type: string
        sets:
          type: integer
        reps:
          type: ["integer", "null"]
        durationSeconds:
          type: ["integer", "null"]
        restSeconds:
          type: ["integer", "null"]
        notes:
          type: ["string", "null"]

    WorkoutPlanInput:
      type: object
      required: [name, exercises]
      properties:
        name:
          type: string
        description:
          type: string
        durationMinutes:
          type: integer
        difficulty:
          type: string
          enum: [beginner, intermediate, advanced]
        category:
          type: string
        exercises:
          type: array
          items:
            $ref: "#/components/schemas/WorkoutExerciseInput"

    WorkoutExerciseInput:
      type: object
      required: [exerciseId, sets]
      properties:
        exerciseId:
          type: integer
        sets:
          type: integer
        reps:
          type: integer
        durationSeconds:
          type: integer
        restSeconds:
          type: integer
        notes:
          type: string

    WorkoutPlanUpdate:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        durationMinutes:
          type: integer
        difficulty:
          type: string
          enum: [beginner, intermediate, advanced]
        isActive:
          type: boolean

    TodayWorkout:
      type: object
      required: [hasWorkout]
      properties:
        hasWorkout:
          type: boolean
        workout:
          $ref: "#/components/schemas/WorkoutPlan"
        scheduledFor:
          type: ["string", "null"]
          format: date-time

    WorkoutCompletion:
      type: object
      required: [id, workoutPlanId, userId, completedAt]
      properties:
        id:
          type: integer
        workoutPlanId:
          type: integer
        workoutName:
          type: string
        userId:
          type: integer
        durationMinutes:
          type: ["integer", "null"]
        caloriesBurned:
          type: ["integer", "null"]
        rating:
          type: ["integer", "null"]
        notes:
          type: ["string", "null"]
        completedAt:
          type: string
          format: date-time

    WorkoutCompletionInput:
      type: object
      properties:
        durationMinutes:
          type: integer
        caloriesBurned:
          type: integer
        rating:
          type: integer
          minimum: 1
          maximum: 5
        notes:
          type: string

    # ─── Exercises ─────────────────────────────────────────────────────────────
    Exercise:
      type: object
      required: [id, name, category, difficulty, muscleGroups]
      properties:
        id:
          type: integer
        name:
          type: string
        category:
          type: string
        difficulty:
          type: string
          enum: [beginner, intermediate, advanced]
        muscleGroups:
          type: array
          items:
            type: string
        equipment:
          type: array
          items:
            type: string
        instructions:
          type: ["string", "null"]
        videoUrl:
          type: ["string", "null"]
        imageUrl:
          type: ["string", "null"]
        caloriesPerMinute:
          type: ["number", "null"]

    # ─── Nutrition ─────────────────────────────────────────────────────────────
    NutritionEntry:
      type: object
      required: [id, userId, name, calories, mealType, loggedAt]
      properties:
        id:
          type: integer
        userId:
          type: integer
        name:
          type: string
        calories:
          type: number
        protein:
          type: ["number", "null"]
        carbs:
          type: ["number", "null"]
        fat:
          type: ["number", "null"]
        fiber:
          type: ["number", "null"]
        mealType:
          type: string
          enum: [breakfast, lunch, dinner, snack]
        servingSize:
          type: ["string", "null"]
        loggedAt:
          type: string
          format: date-time

    NutritionEntryInput:
      type: object
      required: [name, calories, mealType]
      properties:
        name:
          type: string
        calories:
          type: number
        protein:
          type: number
        carbs:
          type: number
        fat:
          type: number
        fiber:
          type: number
        mealType:
          type: string
          enum: [breakfast, lunch, dinner, snack]
        servingSize:
          type: string
        loggedAt:
          type: string
          format: date-time

    NutritionSummary:
      type: object
      required: [totalCalories, totalProtein, totalCarbs, totalFat, calorieGoal, entries]
      properties:
        totalCalories:
          type: number
        totalProtein:
          type: number
        totalCarbs:
          type: number
        totalFat:
          type: number
        calorieGoal:
          type: number
        entries:
          type: integer

    # ─── Progress ──────────────────────────────────────────────────────────────
    ProgressEntry:
      type: object
      required: [id, userId, type, loggedAt]
      properties:
        id:
          type: integer
        userId:
          type: integer
        type:
          type: string
          enum: [weight, measurement, achievement]
        weightKg:
          type: ["number", "null"]
        bodyFatPercent:
          type: ["number", "null"]
        chestCm:
          type: ["number", "null"]
        waistCm:
          type: ["number", "null"]
        hipsCm:
          type: ["number", "null"]
        armCm:
          type: ["number", "null"]
        thighCm:
          type: ["number", "null"]
        notes:
          type: ["string", "null"]
        loggedAt:
          type: string
          format: date-time

    ProgressEntryInput:
      type: object
      required: [type]
      properties:
        type:
          type: string
          enum: [weight, measurement, achievement]
        weightKg:
          type: number
        bodyFatPercent:
          type: number
        chestCm:
          type: number
        waistCm:
          type: number
        hipsCm:
          type: number
        armCm:
          type: number
        thighCm:
          type: number
        notes:
          type: string

    Achievement:
      type: object
      required: [id, name, description, icon, earnedAt]
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        icon:
          type: string
        earnedAt:
          type: string
          format: date-time

    ProgressStats:
      type: object
      required: [totalWorkouts, totalMinutes, totalCaloriesBurned, currentStreak, longestStreak, weightChange, achievementsEarned]
      properties:
        totalWorkouts:
          type: integer
        totalMinutes:
          type: integer
        totalCaloriesBurned:
          type: integer
        currentStreak:
          type: integer
        longestStreak:
          type: integer
        weightChange:
          type: ["number", "null"]
        achievementsEarned:
          type: integer

    # ─── AI ────────────────────────────────────────────────────────────────────
    Conversation:
      type: object
      required: [id, userId, title, createdAt]
      properties:
        id:
          type: integer
        userId:
          type: integer
        title:
          type: string
        lastMessageAt:
          type: ["string", "null"]
          format: date-time
        messageCount:
          type: integer
        createdAt:
          type: string
          format: date-time

    ConversationInput:
      type: object
      required: [title]
      properties:
        title:
          type: string

    Message:
      type: object
      required: [id, conversationId, role, content, createdAt]
      properties:
        id:
          type: integer
        conversationId:
          type: integer
        role:
          type: string
          enum: [user, assistant]
        content:
          type: string
        createdAt:
          type: string
          format: date-time

    MessageInput:
      type: object
      required: [content]
      properties:
        content:
          type: string

    # ─── Subscriptions ─────────────────────────────────────────────────────────
    Subscription:
      type: object
      required: [id, userId, planId, status, currentPeriodEnd]
      properties:
        id:
          type: integer
        userId:
          type: integer
        planId:
          type: string
        planName:
          type: string
        status:
          type: string
          enum: [active, cancelled, expired, trialing]
        currentPeriodEnd:
          type: string
          format: date-time
        cancelAtPeriodEnd:
          type: boolean

    SubscriptionPlan:
      type: object
      required: [id, name, price, interval, features]
      properties:
        id:
          type: string
        name:
          type: string
        price:
          type: number
        interval:
          type: string
          enum: [monthly, yearly]
        features:
          type: array
          items:
            type: string
        isPopular:
          type: boolean
