openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: FitCore AI Fitness App API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: users
    description: User profile operations
  - name: workouts
    description: Workout plan operations
  - name: exercises
    description: Exercise library operations
  - name: nutrition
    description: Nutrition tracking operations
  - name: progress
    description: Progress tracking operations
  - name: dashboard
    description: Dashboard summary operations
  - name: ai
    description: AI coach operations
  - name: subscriptions
    description: Subscription operations
  - name: goals
    description: Goal management operations
  - name: milestones
    description: Goal milestone operations
  - name: progress-photos
    description: Progress photo management
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ─── Auth ───────────────────────────────────────────────────────────────────
  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterInput"
      responses:
        "201":
          description: Registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Validation error

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized

  # ─── Users ──────────────────────────────────────────────────────────────────
  /users/profile:
    get:
      operationId: getUserProfile
      tags: [users]
      summary: Get user profile
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
    patch:
      operationId: updateUserProfile
      tags: [users]
      summary: Update user profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserProfileUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"

  # ─── Dashboard ───────────────────────────────────────────────────────────────
  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get dashboard summary stats
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/activity:
    get:
      operationId: getRecentActivity
      tags: [dashboard]
      summary: Get recent activity feed
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityItem"

  # ─── Workouts ────────────────────────────────────────────────────────────────
  /workouts:
    get:
      operationId: listWorkouts
      tags: [workouts]
      summary: List workout plans
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [active, completed, all]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WorkoutPlan"
    post:
      operationId: createWorkout
      tags: [workouts]
      summary: Create workout plan
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkoutPlanInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkoutPlan"

  # ─── Recovery ───────────────────────────────────────────────────────────────
  /recovery/check-in:
    post:
      operationId: createRecoveryCheckIn
      tags: [recovery]
      summary: Submit daily recovery check-in
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DailyCheckInInput"
      responses:
        "201":
          description: Check-in recorded and recovery score calculated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckInResult"
        "400":
          description: Validation error

  /recovery/today:
    get:
      operationId: getTodayRecovery
      tags: [recovery]
      summary: Get today's recovery data
      responses:
        "200":
          description: Today's recovery data including score, readiness, and muscle status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TodayRecovery"
        "401":
          description: Unauthorized

  /recovery/history:
    get:
      operationId: getRecoveryHistory
      tags: [recovery]
      summary: Get recovery check-in history
      parameters:
        - in: query
          name: days
          schema:
            type: integer
            default: 30
            maximum: 90
          description: Number of days to look back
      responses:
        "200":
          description: Array of past check-ins
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DailyCheckIn"

  /recovery/muscles:
    get:
      operationId: getMuscleRecovery
      tags: [recovery]
      summary: Get per-muscle recovery status
      responses:
        "200":
          description: Array of muscle recovery records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MuscleRecovery"

  /recovery/recommendation:
    get:
      operationId: getRecoveryRecommendation
      tags: [recovery]
      summary: Get today's training recommendation based on recovery
      responses:
        "200":
          description: Training recommendation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecoveryRecommendation"

  /workouts/today:
    get:
      operationId: getTodayWorkout
      tags: [workouts]
      summary: Get today's scheduled workout
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TodayWorkout"

  /workouts/{id}:
    get:
      operationId: getWorkout
      tags: [workouts]
      summary: Get a workout plan
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkoutPlan"
        "404":
          description: Not found
    patch:
      operationId: updateWorkout
      tags: [workouts]
      summary: Update a workout plan
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkoutPlanUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkoutPlan"
    delete:
      operationId: deleteWorkout
      tags: [workouts]
      summary: Delete a workout plan
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /workouts/{id}/complete:
    post:
      operationId: completeWorkout
      tags: [workouts]
      summary: Mark a workout as completed
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkoutCompletionInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkoutCompletion"

  /workouts/history:
    get:
      operationId: getWorkoutHistory
      tags: [workouts]
      summary: Get workout completion history
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 10
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WorkoutCompletion"

  /workouts/templates:
    get:
      operationId: listWorkoutTemplates
      tags: [workouts]
      summary: List pre-built workout templates
      parameters:
        - name: category
          in: query
          required: false
          schema:
            type: string
        - name: goal
          in: query
          required: false
          schema:
            type: string
        - name: difficulty
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WorkoutPlan"

  /workouts/templates/{id}/adopt:
    post:
      operationId: adoptWorkoutTemplate
      tags: [workouts]
      summary: Copy a template into the user's personal workout plans
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkoutPlan"

  /workouts/analytics:
    get:
      operationId: getWorkoutAnalytics
      tags: [workouts]
      summary: Get workout analytics summary
      parameters:
        - name: days
          in: query
          required: false
          schema:
            type: integer
            default: 30
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkoutAnalytics"

  /workouts/{id}/days:
    get:
      operationId: listWorkoutDays
      tags: [workouts]
      summary: List all days in a workout program
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WorkoutDay"
    post:
      operationId: createWorkoutDay
      tags: [workouts]
      summary: Add a day to a workout program
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkoutDayInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkoutDay"

  /workouts/days/{dayId}:
    get:
      operationId: getWorkoutDay
      tags: [workouts]
      summary: Get a workout day with its exercises
      parameters:
        - name: dayId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkoutDayWithExercises"
    patch:
      operationId: updateWorkoutDay
      tags: [workouts]
      summary: Update a workout day
      parameters:
        - name: dayId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkoutDayUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkoutDay"
    delete:
      operationId: deleteWorkoutDay
      tags: [workouts]
      summary: Delete a workout day and its exercises
      parameters:
        - name: dayId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /workouts/days/{dayId}/exercises:
    post:
      operationId: addExerciseToDay
      tags: [workouts]
      summary: Add an exercise to a workout day
      parameters:
        - name: dayId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkoutDayExerciseInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkoutDayExercise"

  /workouts/day-exercises/{id}:
    patch:
      operationId: updateWorkoutDayExercise
      tags: [workouts]
      summary: Update an exercise within a workout day
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkoutDayExerciseUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkoutDayExercise"
    delete:
      operationId: deleteWorkoutDayExercise
      tags: [workouts]
      summary: Remove an exercise from a workout day
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  # AI preparation stubs — no logic yet, will be wired to LLM later
  /workouts/ai/generate:
    post:
      operationId: generateWorkoutPlan
      tags: [workouts]
      summary: "[AI stub] Generate a personalised workout plan"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiWorkoutRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiWorkoutResponse"

  /workouts/ai/modify:
    post:
      operationId: modifyWorkoutPlan
      tags: [workouts]
      summary: "[AI stub] Modify an existing workout plan"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiWorkoutRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiWorkoutResponse"

  /workouts/ai/replace-exercise:
    post:
      operationId: replaceExercise
      tags: [workouts]
      summary: "[AI stub] Replace an exercise with a suitable alternative"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiWorkoutRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiWorkoutResponse"

  /workouts/ai/adjust-difficulty:
    post:
      operationId: adjustWorkoutDifficulty
      tags: [workouts]
      summary: "[AI stub] Increase or decrease workout difficulty"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiWorkoutRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiWorkoutResponse"

  /workouts/ai/analyze:
    post:
      operationId: analyzeWorkoutPerformance
      tags: [workouts]
      summary: "[AI stub] Analyse performance data and suggest adjustments"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiWorkoutRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiWorkoutResponse"

  # ─── Exercises ───────────────────────────────────────────────────────────────
  /exercises:
    get:
      operationId: listExercises
      tags: [exercises]
      summary: List and filter exercises
      parameters:
        - name: category
          in: query
          required: false
          schema:
            type: string
        - name: muscleGroup
          in: query
          required: false
          schema:
            type: string
        - name: difficulty
          in: query
          required: false
          schema:
            type: string
            enum: [beginner, intermediate, advanced, expert]
        - name: trainingType
          in: query
          required: false
          schema:
            type: string
            enum: [strength, hypertrophy, cardio, mobility, flexibility, hiit, rehabilitation, functional]
        - name: equipment
          in: query
          required: false
          schema:
            type: string
        - name: goal
          in: query
          required: false
          schema:
            type: string
        - name: search
          in: query
          required: false
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [exercises, total]
                properties:
                  exercises:
                    type: array
                    items:
                      $ref: "#/components/schemas/Exercise"
                  total:
                    type: integer

  /exercises/{id}:
    get:
      operationId: getExercise
      tags: [exercises]
      summary: Get an exercise by id
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Exercise"
        "404":
          description: Not found

  /exercises/{id}/alternatives:
    get:
      operationId: getExerciseAlternatives
      tags: [exercises]
      summary: Get alternative exercises
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Exercise"
        "404":
          description: Not found

  # ─── Nutrition ───────────────────────────────────────────────────────────────
  /nutrition:
    get:
      operationId: listNutritionEntries
      tags: [nutrition]
      summary: List nutrition entries
      parameters:
        - name: date
          in: query
          required: false
          schema:
            type: string
            format: date
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/NutritionEntry"
    post:
      operationId: createNutritionEntry
      tags: [nutrition]
      summary: Log a meal or food item
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NutritionEntryInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NutritionEntry"

  /nutrition/{id}:
    delete:
      operationId: deleteNutritionEntry
      tags: [nutrition]
      summary: Delete a nutrition entry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /nutrition/summary:
    get:
      operationId: getNutritionSummary
      tags: [nutrition]
      summary: Get daily nutrition summary
      parameters:
        - name: date
          in: query
          required: false
          schema:
            type: string
            format: date
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NutritionSummary"

  # ─── Body Measurements ───────────────────────────────────────────────────────
  /body-measurements/compare:
    get:
      operationId: getBodyMeasurementComparison
      tags: [progress]
      summary: Compare a measurement between two dates
      parameters:
        - name: measurementType
          in: query
          required: true
          schema:
            type: string
            enum: [weight, bodyFat, waist, chest, arms, hips, thighs]
        - name: startDate
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: endDate
          in: query
          required: false
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: Comparison result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BodyMeasurementComparisonResult"
        "400":
          description: Invalid parameters
        "404":
          description: No data found
        "422":
          description: Only one measurement exists

  /body-measurements/chart:
    get:
      operationId: getBodyMeasurementChart
      tags: [progress]
      summary: Get chart-ready measurement data grouped by metric
      parameters:
        - name: range
          in: query
          required: false
          schema:
            type: string
            enum: [30d, 90d, 1y, all]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BodyMeasurementChartData"

  /body-measurements/history:
    get:
      operationId: getBodyMeasurementHistory
      tags: [progress]
      summary: Get body measurement history sorted newest first
      parameters:
        - name: field
          in: query
          required: false
          schema:
            type: string
            enum: [weight, bodyFat, waist, chest, arms, hips, thighs]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProgressEntry"

  /body-measurements/{id}:
    delete:
      operationId: deleteBodyMeasurement
      tags: [progress]
      summary: Delete a body measurement entry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteResponse"
        "404":
          description: Not found

  # ─── Progress ────────────────────────────────────────────────────────────────
  /progress:
    get:
      operationId: listProgressEntries
      tags: [progress]
      summary: List progress entries
      parameters:
        - name: type
          in: query
          required: false
          schema:
            type: string
            enum: [weight, measurement, achievement]
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 30
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProgressEntry"
    post:
      operationId: createProgressEntry
      tags: [progress]
      summary: Log a progress entry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProgressEntryInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProgressEntry"

  /progress/achievements:
    get:
      operationId: getAchievements
      tags: [progress]
      summary: Get user achievements
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Achievement"

  /progress/stats:
    get:
      operationId: getProgressStats
      tags: [progress]
      summary: Get progress statistics
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProgressStats"

  /progress/monthly-report:
    get:
      operationId: getProgressMonthlyReport
      tags: [progress]
      summary: Get monthly progress report
      description: Returns aggregated progress stats for a given month and year. Returns zeros for months with no data.
      parameters:
        - name: month
          in: query
          required: true
          schema:
            type: integer
            minimum: 1
            maximum: 12
          description: Month number (1–12)
        - name: year
          in: query
          required: true
          schema:
            type: integer
            minimum: 2000
            maximum: 2100
          description: Four-digit year
      responses:
        "200":
          description: Monthly report data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MonthlyReport"
        "400":
          description: Invalid month or year
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /progress/summary:
    get:
      operationId: getProgressSummary
      tags: [progress]
      summary: Get aggregated progress summary
      description: Returns aggregated progress data across goals, workouts, measurements, photos, and personal records. Handles new users and missing data gracefully.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProgressSummary"

  # ─── AI Coach ────────────────────────────────────────────────────────────────
  /ai/conversations:
    get:
      operationId: listConversations
      tags: [ai]
      summary: List AI coach conversations
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Conversation"
    post:
      operationId: createConversation
      tags: [ai]
      summary: Start a new conversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConversationInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Conversation"

  /ai/conversations/{id}/messages:
    get:
      operationId: getConversationMessages
      tags: [ai]
      summary: Get messages in a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Message"
    post:
      operationId: sendMessage
      tags: [ai]
      summary: Send a message to the AI coach
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MessageInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"

  # ─── Subscriptions ───────────────────────────────────────────────────────────
  /subscriptions/current:
    get:
      operationId: getCurrentSubscription
      tags: [subscriptions]
      summary: Get current subscription
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Subscription"

  /subscriptions/plans:
    get:
      operationId: listSubscriptionPlans
      tags: [subscriptions]
      summary: List available subscription plans
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SubscriptionPlan"

  # ─── Goals ───────────────────────────────────────────────────────────────────
  /goals:
    get:
      operationId: listGoals
      tags: [goals]
      summary: List all goals for the current user
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [active, completed, paused, cancelled, expired]
        - name: category
          in: query
          required: false
          schema:
            type: string
        - name: priority
          in: query
          required: false
          schema:
            type: string
            enum: [high, medium, low]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Goal"
    post:
      operationId: createGoal
      tags: [goals]
      summary: Create a new goal
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GoalInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Goal"
        "400":
          description: Validation error

  /goals/primary:
    get:
      operationId: getPrimaryGoal
      tags: [goals]
      summary: Get the user's primary active goal
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Goal"

  /goals/progress:
    get:
      operationId: getGoalsProgress
      tags: [goals]
      summary: Get progress summary for all user goals
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GoalProgress"

  /goals/milestones/upcoming:
    get:
      operationId: getUpcomingMilestone
      tags: [milestones]
      summary: Get the next upcoming milestone across the user's active goals
      responses:
        "200":
          description: OK or null if no active goals / no milestones generated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpcomingMilestone"

  /goals/{id}:
    get:
      operationId: getGoal
      tags: [goals]
      summary: Get a goal by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Goal"
        "404":
          description: Not found
    put:
      operationId: updateGoal
      tags: [goals]
      summary: Update a goal
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GoalUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Goal"
        "404":
          description: Not found
    delete:
      operationId: deleteGoal
      tags: [goals]
      summary: Delete a goal
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteResponse"
        "404":
          description: Not found

  /goals/{goalId}/milestones:
    get:
      operationId: getGoalMilestones
      tags: [milestones]
      summary: Get all milestones for a specific goal
      parameters:
        - name: goalId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GoalMilestone"
        "404":
          description: Goal not found

  /goals/{goalId}/milestones/generate:
    post:
      operationId: generateMilestones
      tags: [milestones]
      summary: Generate the 4 default milestones (25/50/75/100%) for a goal
      parameters:
        - name: goalId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "201":
          description: Milestones created (idempotent — skips existing)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GoalMilestone"
        "404":
          description: Goal not found

  /progress-photos:
    get:
      tags: [progress-photos]
      summary: List progress photos
      security:
        - bearerAuth: []
      parameters:
        - name: type
          in: query
          required: false
          schema:
            type: string
            enum: [front, side, back, custom]
      responses:
        "200":
          description: List of progress photos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProgressPhoto"
    post:
      tags: [progress-photos]
      summary: Upload a progress photo
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProgressPhotoInput"
      responses:
        "201":
          description: Photo created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProgressPhoto"
        "400":
          description: Validation error

  /progress-photos/timeline:
    get:
      tags: [progress-photos]
      summary: Get all progress photos sorted by date (newest first)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Timeline of progress photos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProgressPhoto"

  /progress-photos/compare:
    get:
      tags: [progress-photos]
      summary: Compare two progress photos
      security:
        - bearerAuth: []
      parameters:
        - name: beforePhotoId
          in: query
          required: true
          schema:
            type: integer
        - name: afterPhotoId
          in: query
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Photo comparison result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ComparePhotosResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Photo not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /progress-photos/reminder:
    get:
      tags: [progress-photos]
      summary: Get current reminder settings and status
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Reminder settings and status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PhotoReminderResponse"
    put:
      tags: [progress-photos]
      summary: Update reminder frequency
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateReminderInput"
      responses:
        "200":
          description: Updated reminder settings and status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PhotoReminderResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /progress-photos/{id}:
    delete:
      tags: [progress-photos]
      summary: Delete a progress photo
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Photo deleted
          content:
            application/json:
              schema:
                type: object
                required: [deleted, id]
                properties:
                  deleted:
                    type: boolean
                  id:
                    type: integer
        "404":
          description: Photo not found

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    MessageResponse:
      type: object
      properties:
        message:
          type: string
      required:
        - message

    # ─── Auth ──────────────────────────────────────────────────────────────────
    RegisterInput:
      type: object
      required: [email, password, name]
      properties:
        email:
          type: string
        password:
          type: string
          minLength: 8
        name:
          type: string

    LoginInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
        password:
          type: string

    AuthResponse:
      type: object
      required: [user, token]
      properties:
        user:
          $ref: "#/components/schemas/User"
        token:
          type: string

    User:
      type: object
      required: [id, email, name, createdAt]
      properties:
        id:
          type: integer
        email:
          type: string
        name:
          type: string
        avatarUrl:
          type: ["string", "null"]
        subscriptionStatus:
          type: string
          enum: [free, premium, elite]
        onboardingCompleted:
          type: boolean
        createdAt:
          type: string
          format: date-time

    # ─── User Profile ──────────────────────────────────────────────────────────
    UserProfile:
      type: object
      required: [id, userId, fitnessLevel, goals]
      properties:
        id:
          type: integer
        userId:
          type: integer
        age:
          type: ["integer", "null"]
        gender:
          type: ["string", "null"]
          enum: [male, female, non_binary, prefer_not_to_say, null]
        heightCm:
          type: ["number", "null"]
        weightKg:
          type: ["number", "null"]
        primaryGoal:
          type: ["string", "null"]
          enum: [lose_fat, build_muscle, increase_strength, improve_endurance, improve_health, maintain, null]
        secondaryGoals:
          type: array
          items:
            type: string
        fitnessLevel:
          type: string
          enum: [beginner, intermediate, advanced, athlete]
        activityLevel:
          type: ["string", "null"]
          enum: [sedentary, lightly_active, moderately_active, very_active, extremely_active, null]
        workoutLocation:
          type: ["string", "null"]
          enum: [home, gym, outdoor, mixed, null]
        equipmentAvailable:
          type: array
          items:
            type: string
        weeklyWorkoutTarget:
          type: ["integer", "null"]
        workoutDurationMinutes:
          type: ["integer", "null"]
        injuries:
          type: array
          items:
            type: string
        injuryNotes:
          type: ["string", "null"]
        dietPreference:
          type: ["string", "null"]
          enum: [no_preference, high_protein, vegetarian, vegan, keto, mediterranean, low_carb, null]
        foodRestrictions:
          type: array
          items:
            type: string
        motivation:
          type: ["string", "null"]
          enum: [look_better, feel_healthier, build_confidence, improve_performance, prepare_for_event, null]
        sleepHours:
          type: ["string", "null"]
          enum: [lt5, h5_7, h7_9, gt9, null]
        goals:
          type: array
          items:
            type: string
        fitnessReadinessScore:
          type: ["integer", "null"]
        preferences:
          type: object
          additionalProperties: true

    UserProfileUpdate:
      type: object
      properties:
        age:
          type: integer
        gender:
          type: string
        heightCm:
          type: number
        weightKg:
          type: number
        primaryGoal:
          type: string
          enum: [lose_fat, build_muscle, increase_strength, improve_endurance, improve_health, maintain]
        secondaryGoals:
          type: array
          items:
            type: string
        fitnessLevel:
          type: string
          enum: [beginner, intermediate, advanced, athlete]
        activityLevel:
          type: string
          enum: [sedentary, lightly_active, moderately_active, very_active, extremely_active]
        workoutLocation:
          type: string
          enum: [home, gym, outdoor, mixed]
        equipmentAvailable:
          type: array
          items:
            type: string
        weeklyWorkoutTarget:
          type: integer
        workoutDurationMinutes:
          type: integer
        injuries:
          type: array
          items:
            type: string
        injuryNotes:
          type: string
        dietPreference:
          type: string
          enum: [no_preference, high_protein, vegetarian, vegan, keto, mediterranean, low_carb]
        foodRestrictions:
          type: array
          items:
            type: string
        motivation:
          type: string
          enum: [look_better, feel_healthier, build_confidence, improve_performance, prepare_for_event]
        sleepHours:
          type: string
          enum: [lt5, h5_7, h7_9, gt9]
        goals:
          type: array
          items:
            type: string

    # ─── Dashboard ─────────────────────────────────────────────────────────────
    DashboardSummary:
      type: object
      required: [workoutsThisWeek, weeklyTarget, totalMinutes, caloriesBurned, currentStreak, nutritionToday]
      properties:
        workoutsThisWeek:
          type: integer
        weeklyTarget:
          type: integer
        totalMinutes:
          type: integer
        caloriesBurned:
          type: integer
        currentStreak:
          type: integer
        nutritionToday:
          $ref: "#/components/schemas/NutritionSummary"
        nextWorkout:
          $ref: "#/components/schemas/TodayWorkout"

    ActivityItem:
      type: object
      required: [id, type, title, description, occurredAt]
      properties:
        id:
          type: integer
        type:
          type: string
          enum: [workout_completed, nutrition_logged, progress_logged, achievement_earned]
        title:
          type: string
        description:
          type: string
        occurredAt:
          type: string
          format: date-time

    # ─── Workouts ──────────────────────────────────────────────────────────────
    WorkoutPlan:
      type: object
      required: [id, userId, name, exercises, createdAt]
      properties:
        id:
          type: integer
        userId:
          type: integer
        name:
          type: string
        description:
          type: ["string", "null"]
        goal:
          type: ["string", "null"]
          enum: [fat_loss, muscle_gain, strength, endurance, general_fitness, mobility, null]
        status:
          type: string
          enum: [draft, active, archived]
        durationMinutes:
          type: ["integer", "null"]
        durationWeeks:
          type: ["integer", "null"]
        difficulty:
          type: string
          enum: [beginner, intermediate, advanced]
        category:
          type: ["string", "null"]
        isTemplate:
          type: boolean
        weeklySchedule:
          type: object
          nullable: true
          properties:
            days:
              type: array
              items:
                type: integer
            frequency:
              type: integer
        progressionRules:
          type: object
          nullable: true
          additionalProperties: false
        exercises:
          type: array
          items:
            $ref: "#/components/schemas/WorkoutExercise"
        isActive:
          type: boolean
        completionCount:
          type: integer
        createdAt:
          type: string
          format: date-time

    WorkoutExercise:
      type: object
      required: [exerciseId, name, sets]
      properties:
        exerciseId:
          type: integer
        name:
          type: string
        orderIndex:
          type: ["integer", "null"]
        sets:
          type: integer
        repsMin:
          type: ["integer", "null"]
        repsMax:
          type: ["integer", "null"]
        reps:
          type: ["integer", "null"]
        weightKg:
          type: ["number", "null"]
        durationSeconds:
          type: ["integer", "null"]
        restSeconds:
          type: ["integer", "null"]
        tempo:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]

    WorkoutPlanInput:
      type: object
      required: [name, exercises]
      properties:
        name:
          type: string
        description:
          type: string
        goal:
          type: string
          enum: [fat_loss, muscle_gain, strength, endurance, general_fitness, mobility]
        status:
          type: string
          enum: [draft, active, archived]
        durationMinutes:
          type: integer
        durationWeeks:
          type: integer
        difficulty:
          type: string
          enum: [beginner, intermediate, advanced]
        category:
          type: string
        weeklySchedule:
          type: object
        exercises:
          type: array
          items:
            $ref: "#/components/schemas/WorkoutExerciseInput"

    WorkoutExerciseInput:
      type: object
      required: [exerciseId, sets]
      properties:
        exerciseId:
          type: integer
        orderIndex:
          type: integer
        sets:
          type: integer
        repsMin:
          type: integer
        repsMax:
          type: integer
        reps:
          type: integer
        weightKg:
          type: number
        durationSeconds:
          type: integer
        restSeconds:
          type: integer
        tempo:
          type: string
        notes:
          type: string

    WorkoutPlanUpdate:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        goal:
          type: string
        status:
          type: string
        durationMinutes:
          type: integer
        durationWeeks:
          type: integer
        difficulty:
          type: string
          enum: [beginner, intermediate, advanced]
        category:
          type: string
        weeklySchedule:
          type: object
        exercises:
          type: array
          items:
            $ref: "#/components/schemas/WorkoutExerciseInput"
        isActive:
          type: boolean

    TodayWorkout:
      type: object
      required: [hasWorkout]
      properties:
        hasWorkout:
          type: boolean
        workout:
          $ref: "#/components/schemas/WorkoutPlan"
        scheduledFor:
          type: ["string", "null"]
          format: date-time

    WorkoutCompletion:
      type: object
      required: [id, workoutPlanId, userId, completedAt]
      properties:
        id:
          type: integer
        workoutPlanId:
          type: integer
        workoutName:
          type: string
        userId:
          type: integer
        startTime:
          type: ["string", "null"]
          format: date-time
        endTime:
          type: ["string", "null"]
          format: date-time
        durationMinutes:
          type: ["integer", "null"]
        caloriesBurned:
          type: ["integer", "null"]
        exercisesCompleted:
          type: array
          items:
            type: object
        difficultyRating:
          type: ["integer", "null"]
          minimum: 1
          maximum: 5
        rating:
          type: ["integer", "null"]
        notes:
          type: ["string", "null"]
        completedAt:
          type: string
          format: date-time

    WorkoutCompletionInput:
      type: object
      properties:
        startTime:
          type: string
          format: date-time
        endTime:
          type: string
          format: date-time
        durationMinutes:
          type: integer
        caloriesBurned:
          type: integer
        exercisesCompleted:
          type: array
          items:
            type: object
        difficultyRating:
          type: integer
          minimum: 1
          maximum: 5
        rating:
          type: integer
          minimum: 1
          maximum: 5
        notes:
          type: string

    # ─── Workout Day Schemas ────────────────────────────────────────────────────

    WorkoutDay:
      type: object
      required: [id, workoutPlanId, dayNumber, title]
      properties:
        id:
          type: integer
        workoutPlanId:
          type: integer
        dayNumber:
          type: integer
        title:
          type: string
        focusArea:
          type: ["string", "null"]
        estimatedDurationMinutes:
          type: ["integer", "null"]
        isRestDay:
          type: boolean
        createdAt:
          type: string
          format: date-time

    WorkoutDayWithExercises:
      allOf:
        - $ref: "#/components/schemas/WorkoutDay"
        - type: object
          properties:
            exercises:
              type: array
              items:
                $ref: "#/components/schemas/WorkoutDayExercise"

    WorkoutDayInput:
      type: object
      required: [dayNumber, title]
      properties:
        dayNumber:
          type: integer
        title:
          type: string
        focusArea:
          type: string
        estimatedDurationMinutes:
          type: integer
        isRestDay:
          type: boolean

    WorkoutDayUpdate:
      type: object
      properties:
        title:
          type: string
        focusArea:
          type: string
        estimatedDurationMinutes:
          type: integer
        isRestDay:
          type: boolean

    WorkoutDayExercise:
      type: object
      required: [id, workoutDayId, exerciseId, exerciseName, sets]
      properties:
        id:
          type: integer
        workoutDayId:
          type: integer
        exerciseId:
          type: integer
        exerciseName:
          type: string
        orderIndex:
          type: integer
        sets:
          type: integer
        repsMin:
          type: ["integer", "null"]
        repsMax:
          type: ["integer", "null"]
        weightKg:
          type: ["number", "null"]
        durationSeconds:
          type: ["integer", "null"]
        restSeconds:
